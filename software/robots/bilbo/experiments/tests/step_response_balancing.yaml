id: step_response_balancing
description: Step response for a step on the external input
timeout: 15.0
external_input_enabled: false
actions:
  - type: set_mode
    mode: BALANCING

  - type: wait_time
    time_ms: 1000

  - type: set_velocity
    forward: 0.75
    turn: 0.0

  - type: set_input
    input: [0.5, 1]
    normalized: false

  - type: wait_time
    time_ms: 3000

  - type: set_mode
    mode: "OFF"
