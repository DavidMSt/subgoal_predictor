id: test
description: Simple test experiment with balancing and input control
timeout: 30.0
actions:
  - mode: BALANCING
  - beep
  - type: enable_external_input
    enabled: false
  - type: set_input
    input: [0.4, 0.0]
    normalized: true
    delay: 3.0
  - wait: 2.0
  - type: set_input
    input: [0.0, 0.0]
    normalized: true
  - wait: 2.0
  - speak: "Test complete"
  - mode: "OFF"
  - type: reset
