id: velocity_test_2
description: Test velocity control with forward, turn, and backward movement
timeout: 25.0
external_input_enabled: false
actions:
  - type: set_mode
    mode: VELOCITY

  - type: wait_time
    time_ms: 500

  # Phase 1: Drive forward
  - id: set_forward
    type: set_velocity
    forward: 0.5
    turn: 0.0

  - type: wait_time
    id: forward
    time_ms: 3000

  # Phase 2: Stop briefly
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 500

  # Phase 3: Turn in place
  - id: turn
    type: set_velocity
    forward: 0.0
    turn: 1.5

  - type: wait_time
    time_ms: 2000

  # Phase 4: Stop briefly
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 500

  # Phase 5: Drive backward
  - id: backward
    type: set_velocity
    forward: -0.5
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  # Final: Stop and disable
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  - type: set_mode
    mode: "OFF"
