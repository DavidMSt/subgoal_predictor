id: loop_velocity_sweep_test
description: Velocity sweep - drive to (1,1) then test different forward velocities
timeout: 120.0
external_input_enabled: false

actions:
  # Initial setup
  - type: set_mode
    mode: BALANCING

  - type: beep
    frequency: 1000
    time_ms: 250

  - type: wait_time
    time_ms: 2000

  # Sweep over velocities
  - type: loop
    variable: speed
    values: [0.3, 0.4, 0.5, 0.6]
    label: "Loop"
    meta:
      label_layer: 0
      loop_labels: "iteration ${_index}"
      loop_labels_layer: 1
    actions:
      - type: group
        id: "trial_${_index}"
        label: "speed=${speed}"
        meta:
          label_layer: 2
        actions:
          # Navigate to initial point
          - type: set_mode
            mode: POSITION
          - type: move_to
            x: 1.0
            y: 1.0
          - type: wait_time
            time_ms: 500

          # Velocity test
          - type: set_mode
            mode: VELOCITY
          - type: set_velocity
            forward: "${speed}"
            turn: 0.0
          - type: wait_time
            time_ms: 3000
          - type: set_velocity
            forward: 0.0
            turn: 0.0
          - type: wait_time
            time_ms: 1000

  # Cleanup
  - type: set_mode
    mode: BALANCING

  - type: speak
    text: "Velocity sweep complete"

  - type: set_mode
    mode: "OFF"
