id: loop_test
description: Loop test - drive to initial point (1,1) then run a velocity group, repeated 3 times
timeout: 120.0
external_input_enabled: false

actions:
  # Initial setup
  - type: set_mode
    mode: BALANCING

  - type: beep
    frequency: 1000
    time_ms: 250

  - type: wait_time
    time_ms: 2000

  # Repeat: go to (1,1) then run a velocity group
  - type: loop
    count: 3
    actions:
      - type: group
        id: "trial_${_index}"
        label: "Trial ${_index}"
        actions:
          # Navigate to initial point
          - type: set_mode
            mode: POSITION
          - type: move_to
            x: 1.0
            y: 1.0
          - type: wait_time
            time_ms: 500

          # Velocity group
          - type: set_mode
            mode: VELOCITY
          - type: set_velocity
            forward: 0.5
            turn: 0.0
          - type: wait_time
            time_ms: 3000
          - type: set_velocity
            forward: 0.0
            turn: 0.0
          - type: wait_time
            time_ms: 1000

  # Cleanup
  - type: set_mode
    mode: BALANCING

  - type: speak
    text: "Loop test complete"

  - type: set_mode
    mode: "OFF"
