id: velocity_group_test
description: Test velocity control using groups for data extraction
timeout: 30.0
actions:
  # Initial setup
  - type: set_mode
    mode: BALANCING

  - type: beep
    frequency: 1000
    time_ms: 250

  - type: wait_time
    time_ms: 2000

  # Group 1: Forward velocity test
  - type: group
    id: forward_velocity
    actions:
      - type: set_mode
        mode: VELOCITY
      - type: set_velocity
        forward: 0.5
        turn: 0.0
      - type: wait_time
        time_ms: 3000

  # Pause between groups
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  # Group 2: Turn velocity test
  - type: group
    id: turn_velocity
    actions:
      - type: set_mode
        mode: VELOCITY
      - type: set_velocity
        forward: 0.0
        turn: 0.5
      - type: wait_time
        time_ms: 2000

  # Pause between groups
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  # Group 3: Combined velocity test
  - type: group
    id: combined_velocity
    actions:
      - type: set_mode
        mode: VELOCITY
      - type: set_velocity
        forward: 0.3
        turn: 0.2
      - type: wait_time
        time_ms: 3000

  # Cleanup
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  - type: speak
    text: "Test complete"

  - type: set_mode
    mode: "OFF"
