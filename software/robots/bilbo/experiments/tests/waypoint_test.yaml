id: waypoint_test
description: Test position control with waypoints at (1,0.5), (2.5,1), (1,2)
timeout: 60.0
external_input_enabled: false

actions:
  # Set position control mode
  - type: set_mode
    mode: POSITION

  - type: wait_time
    time_ms: 500

  - id: set_waypoints
    type: set_waypoints
    waypoints:
      # Outer loop (exact bounds)
      - x: 2.5
        y: 0.5
        type: STOP
        weight: 1.0
      - x: 2.5
        y: 2.5
        type: STOP
        weight: 1.0
      - x: 0.5
        y: 2.5
        type: STOP
        weight: 1.0
      - x: 0.5
        y: 0.5
        type: STOP
        weight: 1.0

      # Spiral inward
      - x: 2.0
        y: 0.5
        type: STOP
        weight: 0.99
      - x: 2.0
        y: 2.0
        type: STOP
        weight: 0.99
      - x: 1.0
        y: 2.0
        type: STOP
        weight: 0.99
      - x: 1.0
        y: 1.0
        type: STOP
        weight: 0.99

      # Final convergence
      - x: 1.5
        y: 1.5
        type: STOP
        weight: 1.0

  # Start path following
  - id: start_path
    type: start_path
    max_speed: 0.5

#  # Wait for path completion
#  - id: wait_path_complete
#    type: wait_position_event
#    event: path_finished
#    timeout: 45.0

  # Brief pause at end
  - type: wait_time
    time_ms: 1000

  # Disable
  - type: set_mode
    mode: "BALANCING"
