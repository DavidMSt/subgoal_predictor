id: navigation_test
description: Test velocity control, slow PASS waypoints, and fast STOP waypoints on 3x3m testbed
timeout: 120.0
external_input_enabled: false

actions:
  # Initial setup
  - type: set_mode
    mode: BALANCING

  - type: beep
    frequency: 1000
    time_ms: 250

  - type: wait_time
    time_ms: 1000

  # === Group 1: Velocity Control ===
  - type: group
    id: velocity_drive
    label: "Velocity Control"
    actions:
      - type: set_mode
        mode: VELOCITY
      - type: set_velocity
        forward: 0.6
        turn: 0.0
      - type: wait_time
        time_ms: 3000

  # Stop and settle
  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 1000

  # Move to start position for waypoint tests
  - type: set_mode
    mode: POSITION

  - type: move_to
    x: 0.5
    y: 0.5

  - type: wait_time
    time_ms: 500

  # === Group 2: Slow PASS Waypoints ===
  - type: group
    id: slow_pass_waypoints
    label: "Slow PASS Waypoints"
    actions:
      - type: set_waypoints
        waypoints:
          - x: 2.0
            y: 0.5
            type: PASS
            weight: 0.75
          - x: 2.5
            y: 2.0
            type: PASS
            weight: 0.75
          - x: 0.5
            y: 2.5
            type: PASS
            weight: 0.75
          - x: 1.5
            y: 1.5
            type: STOP
            weight: 1.0
      - type: start_path
        max_speed: 0.5
        timeout: 45.0

  - type: wait_time
    time_ms: 500

  # Return to start position
  - type: move_to
    x: 0.5
    y: 0.5

  - type: wait_time
    time_ms: 500

  # === Group 3: Fast STOP Waypoints ===
  - type: group
    id: fast_stop_waypoints
    label: "Fast STOP Waypoints"
    actions:
      - type: set_waypoints
        waypoints:
          - x: 2.5
            y: 0.5
            type: STOP
            weight: 1.0
          - x: 2.5
            y: 2.5
            type: STOP
            weight: 1.0
          - x: 0.5
            y: 2.5
            type: STOP
            weight: 1.0
          - x: 1.5
            y: 1.5
            type: STOP
            weight: 1.0
          - x: 0.5
            y: 0.5
            type: STOP
            weight: 1.0
      - type: start_path
        max_speed: 0.75
        timeout: 60.0

  # Cleanup
  - type: wait_time
    time_ms: 1000

  - type: speak
    text: "Navigation test complete"

  - type: set_mode
    mode: BALANCING
