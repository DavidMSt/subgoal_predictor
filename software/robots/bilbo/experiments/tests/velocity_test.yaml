id: velocity_test
description: Test velocity control with forward movement
timeout: 15.0
external_input_enabled: false
actions:
  - type: set_mode
    mode: VELOCITY

  - type: wait_time
    time_ms: 1000

  - type: set_velocity
    forward: 0.75
    turn: 0.0

  - type: wait_time
    time_ms: 3000

  - type: set_velocity
    forward: 0.0
    turn: 0.0

  - type: wait_time
    time_ms: 2000

  - type: set_mode
    mode: "OFF"
