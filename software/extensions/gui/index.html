<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BILBOLab</title>
    <link rel="icon" href="./src/lib/assets/bilbo_icon.png" type="image/x-icon"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #18181b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        header {
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #09090b;
            border-bottom: 1px solid #27272a;
        }

        .logo {
            height: 42px;
            opacity: 0.95;
        }

        .subtitle {
            color: #71717a;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .container {
            display: flex;
            flex: 1;
            gap: 24px;
            padding: 24px;
            min-height: 0;
        }

        .preview-card {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #09090b;
            border: 1px solid #27272a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3),
                        0 2px 4px -2px rgba(0, 0, 0, 0.2);
        }

        .preview-card:hover {
            border-color: #3f3f46;
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4),
                        0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        .preview-card .title-bar {
            padding: 16px 20px;
            background: linear-gradient(to bottom, #18181b, #09090b);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #27272a;
        }

        .preview-card .title-bar h2 {
            color: #fafafa;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .preview-card .title-bar .badge {
            background: #27272a;
            color: #a1a1aa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            border: 1px solid #3f3f46;
        }

        .iframe-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #09090b;
        }

        /* The trick: render iframe at 2x size, then scale down */
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            border: none;
            pointer-events: none;
            transform: scale(0.5);
            transform-origin: top left;
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .click-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .click-overlay:hover::before {
            opacity: 1;
        }

        .click-overlay:hover {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        .open-hint {
            opacity: 0;
            transform: translateY(8px);
            background: #fafafa;
            color: #09090b;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .open-hint::after {
            content: '\2192';
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .click-overlay:hover .open-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .click-overlay:hover .open-hint::after {
            transform: translateX(4px);
        }

        /* Subtle gradient overlays for depth */
        .iframe-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, #09090b, transparent);
            pointer-events: none;
        }

        /* ==================== iPhone Mockup ==================== */
        .phone-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #09090b;
            padding: 24px;
            position: relative;
        }

        .iphone-frame {
            position: relative;
            /* iPhone 15 Pro landscape aspect ratio approximately 19.5:9 */
            width: min(90%, 580px);
            aspect-ratio: 19.5 / 9;
            background: linear-gradient(145deg, #2a2a2e 0%, #1a1a1c 50%, #0f0f10 100%);
            border-radius: 40px;
            padding: 8px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.1),
                0 20px 60px rgba(0,0,0,0.6),
                0 8px 20px rgba(0,0,0,0.4),
                inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* Titanium frame edge highlight */
        .iphone-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(145deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Dynamic Island - positioned on left side in landscape */
        .dynamic-island {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 72px;
            background: #000;
            border-radius: 14px;
            z-index: 5;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.8);
        }

        /* Side buttons - right side in landscape (top in portrait) */
        .side-button {
            position: absolute;
            background: linear-gradient(to bottom, #3a3a3c, #2a2a2c);
            border-radius: 2px;
        }

        .side-button.power {
            right: -2px;
            top: 25%;
            width: 3px;
            height: 50px;
            border-radius: 0 2px 2px 0;
        }

        .side-button.volume-up {
            left: -2px;
            top: 20%;
            width: 3px;
            height: 32px;
            border-radius: 2px 0 0 2px;
        }

        .side-button.volume-down {
            left: -2px;
            top: calc(20% + 40px);
            width: 3px;
            height: 32px;
            border-radius: 2px 0 0 2px;
        }

        .side-button.action {
            left: -2px;
            top: calc(20% + 82px);
            width: 3px;
            height: 20px;
            border-radius: 2px 0 0 2px;
        }

        /* Screen area */
        .iphone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
        }

        /* Screen bezel/border highlight */
        .iphone-screen::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 32px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
            pointer-events: none;
            z-index: 3;
        }

        .iphone-screen iframe {
            position: absolute;
            top: 3%;
            left: 3%;
            width: 188%;  /* 200% - 2*6% (scaled) = 188% to account for 3% inset on each side */
            height: 188%;
            border: none;
            pointer-events: none;
            transform: scale(0.5);
            transform-origin: top left;
        }

        .iphone-screen .click-overlay {
            border-radius: 32px;
        }

        /* Screen reflection effect */
        .iphone-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.02) 0%, transparent 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Hover effect for phone */
        .phone-wrapper:hover .iphone-frame {
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.15),
                0 30px 80px rgba(0,0,0,0.7),
                0 12px 30px rgba(0,0,0,0.5),
                inset 0 1px 1px rgba(255,255,255,0.08);
        }
    </style>
</head>
<body>
    <header>
        <img src="./src/lib/assets/bilbolab_logo.png" alt="BILBOLab" class="logo"/>
        <span class="subtitle">Select an interface</span>
    </header>

    <div class="container">
        <div class="preview-card">
            <div class="title-bar">
                <h2>Desktop GUI</h2>
                <span class="badge">/gui</span>
            </div>
            <div class="iframe-wrapper">
                <iframe src="/gui.html" title="Desktop GUI Preview"></iframe>
                <a href="/gui.html" class="click-overlay">
                    <span class="open-hint">Open Desktop GUI</span>
                </a>
            </div>
        </div>

        <div class="preview-card">
            <div class="title-bar">
                <h2>Mobile App</h2>
                <span class="badge">/app</span>
            </div>
            <div class="phone-wrapper">
                <div class="iphone-frame">
                    <!-- Side buttons -->
                    <div class="side-button power"></div>
                    <div class="side-button volume-up"></div>
                    <div class="side-button volume-down"></div>
                    <div class="side-button action"></div>

                    <!-- Dynamic Island -->
                    <div class="dynamic-island"></div>

                    <!-- Screen with iframe -->
                    <div class="iphone-screen">
                        <iframe src="/app.html" title="Mobile App Preview"></iframe>
                        <a href="/app.html" class="click-overlay">
                            <span class="open-hint">Open Mobile App</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
