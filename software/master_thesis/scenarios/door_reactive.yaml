name: door_reactive
limits:
  - [ -5.0 , 5.0 ]
  - [ -5.0 , 5.0 ]

# Wall along y=0 with a 0.8 m gap at x=0.
# half_gap=0.4, half_wall=2.0 → left_cx=-2.4, right_cx=2.4
obstacles:
  - obstacle_id: door_wall_left
    x: -2.4
    y: 0.0
    length: 4.0
    width: 0.2
    psi: 0.0
    height: 1.0
  - obstacle_id: door_wall_right
    x: 2.4
    y: 0.0
    length: 4.0
    width: 0.2
    psi: 0.0
    height: 1.0

agents:
  - agent_id: agent_0
    agent_class_name: FRODOReactiveAgent
    start_config: [ -2.0 , -2.0 , 1.5708 ]
    mppi_horizon: 150
    mppi_n_samples: 200
    replan_interval: 10
  - agent_id: agent_1
    agent_class_name: FRODOReactiveAgent
    start_config: [ 2.0 , 2.0 , -1.5708 ]
    mppi_horizon: 150
    mppi_n_samples: 200
    replan_interval: 10

tasks:
  - task_id: task_0
    x: -2.0
    y: 2.0
    psi: 0.0
  - task_id: task_1
    x: 2.0
    y: -2.0
    psi: 0.0
