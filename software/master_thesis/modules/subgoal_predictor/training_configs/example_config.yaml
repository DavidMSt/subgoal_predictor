# Example Training configuration for train_subgoal.py

# ── Training loop ────────────────────────────────────────────
n_updates: 1000
batch_size: 32
max_sim_steps: 400 # maximum of steps our sim should run for
 
# ── I/O ─────────────────────────────────────────────────────
log_dir: master_thesis/modules/subgoal_predictor/runs
save_dir: master_thesis/modules/subgoal_predictor/checkpoints
initial_weights: null       # path to .pt file, or null to train from scratch
save_every: 50
run_name_override: null     # overrides auto-generated timestamp name
resume: false
record: false
eval_out: null              # path for evaluation output, or null

# ── Environment ──────────────────────────────────────────────
scenario: rl_5n_random_2x2
n_subgoals: 1 # Only option for now
ompl_timelimit: 10.0
wait_mode: continuous         # 'discrete' | 'continuous'
skip_penalty: 4.0
failed_plan_penalty: 0.0

# ── Policy / architecture ────────────────────────────────────
arch: bi_gnn                   # 'bi_gnn' only supported currently 
n_workers: 0

# ── Optimiser ────────────────────────────────────────────────
algo: ppo                   # 'ppo' | 'reinforce'
lr: 3e-4
lr_end: null                # null → no LR schedule
lr_schedule: linear         # 'linear' | 'cosine' (used only when lr_end is set)

# ── Loss coefficients ────────────────────────────────────────
entropy_coeff_pos: 0.003
entropy_coeff_wait: 0.01
diversity_sigma: 0.35

# ── Curriculum / evaluation ──────────────────────────────────
stage: null                 # curriculum stage label, or null
evaluate: false
