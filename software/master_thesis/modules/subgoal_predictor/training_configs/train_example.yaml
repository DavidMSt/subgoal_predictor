run_type: train

# ── Training loop ────────────────────────────────────────
n_updates: 1000
batch_size: 32
max_steps: 400

# ── I/O ─────────────────────────────────────────────────
log_dir: master_thesis/modules/subgoal_predictor/runs
save_dir: master_thesis/modules/subgoal_predictor/checkpoints
run_name_override: null     # set to write into an existing TensorBoard run
initial_weights: null       # set to warm-start from a checkpoint (weights only)

# ── Environment ──────────────────────────────────────────
scenario: rl_5n_random_2x2
ompl_timelimit: 10.0
replan_block_s: 0.5         # measured on M5 Max: successful replans 0.035–0.984s (median ~0.1s); 0.5s is a reasonable conservative target
skip_penalty: 4.0
failed_plan_penalty: 0.0
n_workers: 1

# ── Policy ───────────────────────────────────────────────
arch: bipartite             # 'gnn' | 'bipartite'
algo: ppo                   # 'ppo' | 'reinforce'

# ── Optimiser ────────────────────────────────────────────
lr: 3e-4
lr_end: null                # null → fixed LR; set to enable decay
lr_schedule: linear         # 'linear' | 'cosine'

# ── Loss ─────────────────────────────────────────────────
entropy_coeff_pos: 0.003
entropy_coeff_wait: 0.01

# ── Reward shaping ────────────────────────────────────────
alpha: 0.3              # individual-time weight (terminated branch)
beta: 1.0               # distance-to-goal scale (truncated branch)
crossing_bonus: 1.5     # per-agent bonus for crossing the wall (truncated)
energy_weight: 2.0      # detour-path-length penalty scale (truncated)
diversity_sigma: 0.35   # Gaussian width for subgoal repulsion
diversity_bonus: 1.5    # repulsion penalty scale

# ── Curriculum ───────────────────────────────────────────
stage: null
