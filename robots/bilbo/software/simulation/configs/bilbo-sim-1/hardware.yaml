# ======================================================================
# Default hardware config for simulated BILBO robots.
# Based on bilbo2 but with simulation-appropriate defaults:
#   - theta_offset: 0 (no physical tilt to compensate)
#   - simulation: true
#   - hardware peripherals disabled
# ======================================================================

general:
  id: "bilbo-sim-1"               # Overwritten by simulation-setup.py
  short_id: "sim-1"               # Overwritten by simulation-setup.py
  type: "normal"
  version: "sim"
  color: [0.4, 0.7, 1.0]       # Light blue to distinguish from real robots
  simulation: true

network:
  address: "localhost"
  data_stream_port: 5555
  gui_port: 8000
  ssid: ""
  username: ""
  password: ""

optitrack:
  points: [1, 2, 3, 4, 5]
  point_x_axis_start: 3
  point_x_axis_end: 2
  point_y_axis_start: 5
  point_y_axis_end: 4
  marker_size: 0.01

model:
  type: "normal"
  wheel_diameter: 0.12383
  vertical_offset: 0.137
  mass: 0.0
  height: 0.15
  width: 0.14
  depth: 0.085
  distance_wheels: 0.16
  l_cg: 0.00
  theta_offset: 0.0              # No physical offset in simulation

electronics:
  board_revision: "4"
  shield: "none"
  compute_module: "sim"
  display:
    active: false
    resolution: null
  sound:
    active: false
    gain: null
  battery_cells: 4
  buttons:
    primary:
      type: null
      pin: null
    secondary:
      type: null
      pin: null

estimation:
  enable_dead_reckoning: true
