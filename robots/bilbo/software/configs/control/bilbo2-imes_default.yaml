name: 'bilbo2-imes default control'
description: ''
general:
  max_wheel_speed: 100.0
  max_wheel_torque: 0.5
  enable_external_inputs: true
  torque_offset: [ 0,0 ]
inputs:
  balancing:
    forward:
      max: 0.2
    turn:
      max: 0.08
  velocity:
    forward:
      max: 0.75
    turn:
      max: 3.0
balancing_control:
  K: [ 0.25, 0.2, 0.03, 0.025, 0.25, 0.2, 0.03, -0.025 ]
  tic:
    enabled: true
    ki: 0.4
    max_torque: 0.05
    theta_limit: 0.16
  vic:
    enabled: true
    ki: 0.2
    max_torque: 0.02
    v_limit: 0.05
    theta_limit: 0.16
velocity_control:
  v:
    pid:
      Kp: -0.005 #-0.02
      Kd: 0 #-0.0001
      Ki: -0.05 #-0.5
      Ts: 0.0
      enable_i_limit: false
      i_term_limit: 0.0
      enable_input_limit: false
      input_limit: 0.0
      enable_output_limit: false
      output_limit: 0.0
      enable_d_filter: false
      Td_filter: 0.0
      enable_rate_limit: false
      rate_limit: 0.0
      enable_setpoint_rate_limit: false
      setpoint_rate_limit: 0.0
    feedforward:
      Kv: -0.25
      Ka: 0.0
      Kc: 0.0
      enable_vref_slew: false
      vref_slew_rate: 0.0
      enable_a_filter: false
      Ta_filter: 0.0
      enable_stiction: false
      v0_stiction: 0.0
      v_decay_stiction: 0.15
      enable_output_limit: false
      output_limit: 0.0
      enable_output_slew: false
      output_slew_rate: 0.0
  psidot:
    pid:
      Kp: 0.01
      Kd: 0.0
      Ki: 0.05
      Ts: 0.0
      enable_i_limit: false
      i_term_limit: 0.0
      enable_input_limit: false
      input_limit: 0.0
      enable_output_limit: false
      output_limit: 0.0
      enable_d_filter: false
      Td_filter: 0.0
      enable_rate_limit: false
      rate_limit: 0.0
      enable_setpoint_rate_limit: false
      setpoint_rate_limit: 0.0
    feedforward:
      Kv: 0.03
      Ka: 0.0
      Kc: 0.0
      enable_vref_slew: false
      vref_slew_rate: 0.0
      enable_a_filter: false
      Ta_filter: 0.0
      enable_stiction: false
      v0_stiction: 0.0
      v_decay_stiction: 0.15
      enable_output_limit: false
      output_limit: 0.0
      enable_output_slew: false
      output_slew_rate: 0.0
position_control:
  Ts: 0.01
  kp_angular: 10.0
  ki_angular: 0.3
  kp_linear: 2.0
  ki_linear: 0.0
  max_speed: 0.4
  max_turn_rate: 5.0
  lookahead_base: 0.15
  lookahead_gain: 0.3
  lookahead_max: 0.5
  arrival_tolerance: 0.05
  arrival_dwell_time: 0.5
  reverse_enter_angle: 2.1
  reverse_exit_angle: 1.05
  corner_slowdown_distance: 0.5
