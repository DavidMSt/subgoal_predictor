id: step
description: Step experiment
actions:
  action0:
    time: 0.1
    type: enable_external_input
    enabled: false
  action1:
    type: set_mode
    mode: BALANCING
    time: 1.0
  tic:
    type: set_tic
    enabled: true
    time: 2.0
  move:
    type: set_input
    input: [ 0.2, 0.0 ]
    time: 4.0
    normalized: false
  move2:
    type: set_input
    input: [ 0.0, 0.0 ]
    time: 6.0
    normalized: true
  action2:
    type: set_mode
    mode: OFF
    time: 10
  reset:
    type: reset
    after: action2