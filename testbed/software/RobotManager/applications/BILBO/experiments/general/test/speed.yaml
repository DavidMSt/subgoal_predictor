id: test
description: Speed experiment
actions:
  action0:
    time: 0.1
    type: enable_external_input
    enabled: false
  stand_up:
    type: set_mode
    mode: BALANCING
    time: 1.0
  speed_mode:
    type: set_mode
    mode: VELOCITY
    time: 2.0
  move1:
    type: set_velocity
    time: 5.0
    forward: -0.6
  move2:
    type: set_velocity
    time: 8.0
    forward: 0.0
  reset:
    type: reset
    after: move2